<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5}
.box{background:#fff;padding:30px;border-radius:8px;width:320px;text-align:center}
input{width:90%;padding:10px;margin:10px 0}
button{width:95%;padding:10px;background:#1f6fb2;color:#fff;border:none}
</style>
</head>

<body>

<div class="box">
<h2>Statement Portal</h2>

<h4>User Login</h4>
<input type="text" id="empId" placeholder="Enter ID">
<button onclick="userLogin()">Login</button>

<hr>

<h4>Admin Login</h4>
<button onclick="adminLogin()">Login with Gmail</button>

<div id="err" style="color:red"></div>
</div>

<script>

async function userLogin(){

    const empId=document.getElementById("empId").value.trim();

    if(!empId){
        document.getElementById("err").innerText="Enter ID ❗";
        return;
    }

    const res=await fetch("/user-login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({empId})
    });

    const data=await res.json();

    if(data.success){
        localStorage.setItem("role","user");
        localStorage.setItem("empId",empId);
        window.location="/dashboard";
    }else{
        document.getElementById("err").innerText="Invalid ID ❌";
    }
}

function adminLogin(){
    window.location="/auth/google";
}

</script>

</body>
</html>
