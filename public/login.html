<!DOCTYPE html>
<html>
<head>
  <title>Statement Portal Login</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0b3d91, #1976d2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0b3d91;
      color: white;
      border: none;
      cursor: pointer;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<div class="box">
  <h2>Statement Portal</h2>

  <select id="mode" onchange="toggleMode()">
    <option value="admin">Admin</option>
    <option value="user">User</option>
  </select>

  <div id="adminBox">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
  </div>

  <div id="userBox" class="hidden">
    <input id="email" placeholder="Email">
    <button onclick="userLogin()">Login</button>
  </div>
</div>

<script>

function toggleMode() {
  const mode = document.getElementById('mode').value;
  document.getElementById('adminBox').style.display = mode === 'admin' ? 'block' : 'none';
  document.getElementById('userBox').style.display = mode === 'user' ? 'block' : 'none';
}

async function adminLogin() {

  const res = await fetch('/adminLogin', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    credentials: 'include',
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.status === 'success') {
    window.location = '/dashboard.html';
  } else {
    alert("Invalid login");
  }
}

async function userLogin() {

  const res = await fetch('/userLogin', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    credentials: 'include',
    body: JSON.stringify({
      email: email.value
    })
  });

  const data = await res.json();

  if (data.status === 'success') {
    window.location = '/dashboard.html';
  } else {
    alert("Login failed");
  }
}

</script>

</body>
</html>
