<!DOCTYPE html>
<html>
<head>
  <title>Statement Portal</title>

  <style>
    body {
      font-family: Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f5f6fa;
    }

    .box {
      background:#fff;
      padding:30px;
      border-radius:10px;
      width:350px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width:90%;
      padding:10px;
      margin:10px 0;
    }

    button {
      width:95%;
      padding:10px;
      margin-top:10px;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    .user { background:#1f6fb2;color:white; }
    .admin { background:#db4437;color:white; }

    .error { color:red; margin-top:10px; }
  </style>
</head>

<body>

<div class="box">

  <h2>Statement Portal</h2>

  <!-- USER LOGIN -->
  <h4>User Login</h4>
  <input type="text" id="empId" placeholder="Enter Employee ID">
  <button class="user" onclick="userLogin()">Login</button>

  <hr>

  <!-- ADMIN LOGIN -->
  <h4>Admin Login</h4>
  <button class="admin" onclick="adminLogin()">Login with Google</button>

  <div id="error" class="error"></div>

</div>

<script>

async function userLogin(){

  const empId = document.getElementById("empId").value.trim();

  if(!empId){
    showError("Enter ID ❗");
    return;
  }

  const res = await fetch("/user-login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({empId})
  });

  const data = await res.json();

  if(data.success){
    window.location="/dashboard";
  } else {
    showError("Invalid ID ❌");
  }
}

function adminLogin(){
  window.location = "/auth/google";
}

function showError(msg){
  document.getElementById("error").innerText = msg;
}

</script>

</body>
</html>
