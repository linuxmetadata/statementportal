<!DOCTYPE html>
<html>
<head>
  <title>Statement Portal Login</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0b3d91;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #092d6b;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Statement Portal Login</h2>

  <!-- LOGIN TYPE -->
  <select id="mode" onchange="toggleMode()">
    <option value="admin">Admin Login</option>
    <option value="user">User Login</option>
  </select>

  <!-- ADMIN LOGIN -->
  <div id="adminBox">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
  </div>

  <!-- USER LOGIN -->
  <div id="userBox" style="display:none;">
    <input id="email" placeholder="Enter Email ID">
    <button onclick="userLogin()">Login</button>
  </div>

</div>

<script>

// TOGGLE LOGIN MODE
function toggleMode() {
  const mode = document.getElementById('mode').value;

  document.getElementById('adminBox').style.display =
    mode === 'admin' ? 'block' : 'none';

  document.getElementById('userBox').style.display =
    mode === 'user' ? 'block' : 'none';
}

// ADMIN LOGIN
async function adminLogin() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  const res = await fetch('/adminLogin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.status === 'success') {
    window.location = '/dashboard.html';
  } else {
    alert('❌ Invalid Login');
  }
}

// USER LOGIN (EMAIL BASED)
async function userLogin() {
  const email = document.getElementById('email').value;

  if (!email) {
    return alert("Please enter email");
  }

  const res = await fetch('/userLogin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  if (data.status === 'success') {
    window.location = '/dashboard.html';
  } else {
    alert('❌ ' + data.msg);
  }
}

</script>

</body>
</html>
