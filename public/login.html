<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; }
        .box { padding:30px; border:1px solid #ccc; border-radius:10px; }
        input { display:block; margin:10px 0; padding:8px; width:200px; }
        button { padding:8px 15px; background:#1f6fb2; color:#fff; border:none; }
    </style>
</head>
<body>

<div class="box">
    <h3>Login</h3>
    <input type="text" id="user" placeholder="Email / User ID">
    <input type="password" id="pass" placeholder="Password (admin only)">
    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    const user = document.getElementById('user').value;

    if (!user) {
        alert("Enter login");
        return;
    }

    // Simple login (no validation for now)
    localStorage.setItem("user", user);

    window.location.href = "/dashboard";
}
</script>

</body>
</html>
