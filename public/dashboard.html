<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body { font-family: Arial; padding:20px; }

        table {
            width:100%;
            border-collapse: collapse;
            margin-top:20px;
        }

        th, td {
            border:1px solid #ccc;
            padding:8px;
            text-align:left;
        }

        th {
            background:#1f6fb2;
            color:white;
        }

        button {
            padding:5px 8px;
            margin:2px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>Dashboard</h2>
<button onclick="logout()">Logout</button>

<table>
<thead>
<tr>
    <th>State</th>
    <th>BM HQ</th>
    <th>Code</th>
    <th>Name</th>
    <th>Value</th>
    <th>SSS</th>
    <th>AWS</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

const role = localStorage.getItem("role");
if (!role) window.location.href = "/";

function logout() {
    localStorage.clear();
    window.location.href = "/";
}

// 🧠 TEMP STORAGE (simulate uploaded status)
let uploadedData = {}; 

async function loadData() {

    const res = await fetch('/getData');
    const data = await res.json();
    const rows = data.rows || [];

    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    rows.forEach(row => {

        const code = row["Code"];
        const state = row["STATE"];
        const name = row["Stockist Name"];

        table.innerHTML += `
        <tr>
            <td>${state}</td>
            <td>${row["BM_HQ"]}</td>
            <td>${code}</td>
            <td>${name}</td>
            <td>${row["Sales_Value"] || ''}</td>

            <!-- SSS -->
            <td id="sss_${code}">
                ${renderCell(code, 'SSS', state, name)}
            </td>

            <!-- AWS -->
            <td id="aws_${code}">
                ${renderCell(code, 'AWS', state, name)}
            </td>
        </tr>
        `;
    });
}

// 🎯 RENDER CELL
function renderCell(code, type, state, name) {

    const key = code + "_" + type;
    const data = uploadedData[key];

    // AFTER UPLOAD
    if (data) {
        return `
            <button onclick="viewFile('${data.link}')">View</button>
            ${role === 'admin' ? `<button onclick="deleteFile('${key}')">Delete</button>` : ''}
        `;
    }

    // BEFORE UPLOAD
    if (role !== 'admin') return '-';

    return `
        <input type="file" multiple onchange="selectFiles(event, '${code}', '${type}', '${state}', '${name}')">
        <div id="action_${key}"></div>
    `;
}

// 📂 FILE SELECT
function selectFiles(event, code, type, state, name) {

    const files = event.target.files;
    if (!files.length) return;

    const key = code + "_" + type;

    document.getElementById("action_" + key).innerHTML = `
        <button onclick="uploadFile('${key}', '${code}', '${type}', '${state}', '${name}')">Upload</button>
    `;

    uploadedData[key] = { files }; // temp store
}

// 📤 UPLOAD
async function uploadFile(key, code, type, state, name) {

    const fileData = uploadedData[key];
    if (!fileData) return;

    const formData = new FormData();
    formData.append('code', code);
    formData.append('type', type);
    formData.append('state', state);
    formData.append('name', name);

    for (let file of fileData.files) {
        formData.append('files', file);
    }

    const res = await fetch('/upload', {
        method: 'POST',
        body: formData
    });

    const result = await res.json();

    alert(result.message);

    // simulate stored link
    uploadedData[key] = {
        link: "#"
    };

    reloadCell(code, type, state, name);
}

// 🔄 REFRESH CELL
function reloadCell(code, type, state, name) {
    const id = (type === 'SSS' ? 'sss_' : 'aws_') + code;
    document.getElementById(id).innerHTML = renderCell(code, type, state, name);
}

// 👁 VIEW
function viewFile(link) {
    window.open(link, '_blank');
}

// ❌ DELETE (ADMIN)
function deleteFile(key) {
    delete uploadedData[key];
    location.reload();
}

// 🚀 INIT
loadData();

</script>

</body>
</html>
