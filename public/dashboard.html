<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }

    table { width:100%; border-collapse:collapse; background:#fff; }
    th, td { border:1px solid #ccc; padding:8px; text-align:center; }

    th { background:#1976d2; color:#fff; }

    input { padding:5px; }

    .search-row input {
      width: 95%;
    }

    .card {
      background:#fff;
      padding:15px;
      border-radius:10px;
      width:18%;
      display:inline-block;
      margin:5px;
      text-align:center;
      cursor:pointer;
    }

    .top-bar { display:flex; justify-content:space-between; }

    button {
      padding:6px 10px;
      background:#0b3d91;
      color:#fff;
      border:none;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>Dashboard</h2>

<div class="top-bar">
  <div id="adminActions">
    <button onclick="downloadReport()">Report</button>
    <button onclick="downloadZip()">ZIP</button>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<br>

<div id="summary">
  <div class="card" onclick="setFilter('ALL')">Total<br><b id="total"></b></div>
  <div class="card" onclick="setFilter('SSS_DONE')">SSS Done<br><b id="sssR"></b></div>
  <div class="card" onclick="setFilter('SSS_PENDING')">SSS Pending<br><b id="sssP"></b></div>
  <div class="card" onclick="setFilter('AWS_DONE')">AWS Done<br><b id="awsR"></b></div>
  <div class="card" onclick="setFilter('AWS_PENDING')">AWS Pending<br><b id="awsP"></b></div>
</div>

<br><br>

<table>
<thead>

<!-- 🔍 SEARCH ROW (ABOVE HEADERS) -->
<tr class="search-row">
  <th><input placeholder="Search State" oninput="renderTable()"></th>
  <th><input placeholder="Search BM HQ" oninput="renderTable()"></th>
  <th><input placeholder="Search Code" oninput="renderTable()"></th>
  <th><input placeholder="Search Name" oninput="renderTable()"></th>
  <th></th>
  <th></th>
  <th></th>
</tr>

<tr>
<th>State</th>
<th>BM HQ</th>
<th>Code</th>
<th>Name</th>
<th>Value</th>
<th>SSS</th>
<th>AWS</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script>

let data = [];
let uploads = {};
let role = "";
let filterType = "ALL";

async function load() {

  const res = await fetch('/getData', { credentials:'include' });

  if (res.status === 401) {
    window.location = '/login.html';
    return;
  }

  const result = await res.json();

  data = result.rows;
  uploads = result.uploads;
  role = result.role;

  if (role !== 'admin') {
    document.getElementById('adminActions').style.display = 'none';
  }

  renderTable();
  updateSummary();
}

function updateSummary() {

  let sssR=0, sssP=0, awsR=0, awsP=0;

  data.forEach(d=>{
    d.SSS_Status==="Done"?sssR++:sssP++;
    d.AWS_Status==="Done"?awsR++:awsP++;
  });

  total.innerText = data.length;
  sssR.innerText = sssR;
  sssP.innerText = sssP;
  awsR.innerText = awsR;
  awsP.innerText = awsP;
}

function setFilter(type){
  filterType = type;
  renderTable();
}

function renderTable(){

  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  const inputs = document.querySelectorAll(".search-row input");

  data.forEach(d=>{

    // 🔍 Column search logic
    if (inputs[0].value && !d.State.toLowerCase().includes(inputs[0].value.toLowerCase())) return;
    if (inputs[1].value && !d["BM HQ"].toLowerCase().includes(inputs[1].value.toLowerCase())) return;
    if (inputs[2].value && !String(d.Code).toLowerCase().includes(inputs[2].value.toLowerCase())) return;
    if (inputs[3].value && !d["Stockist Name"].toLowerCase().includes(inputs[3].value.toLowerCase())) return;

    // 🔹 Card filters
    if(filterType==="SSS_DONE" && d.SSS_Status!=="Done") return;
    if(filterType==="SSS_PENDING" && d.SSS_Status!=="Pending") return;
    if(filterType==="AWS_DONE" && d.AWS_Status!=="Done") return;
    if(filterType==="AWS_PENDING" && d.AWS_Status!=="Pending") return;

    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${d.State}</td>
      <td>${d["BM HQ"]}</td>
      <td>${d.Code}</td>
      <td>${d["Stockist Name"]}</td>

      <td><input id="val_${d.Code}" value="${d.SSS_Value || d.AWS_Value || ''}"></td>

      <td>${renderCell(d,'SSS')}</td>
      <td>${renderCell(d,'AWS')}</td>
    `;

    tbody.appendChild(tr);
  });
}

function renderCell(d,type){

  const key = `${d.Code}_${type}`;

  if(uploads[key]){
    return uploads[key].files.map(f =>
      `<a href="${f.fileUrl}" target="_blank">File</a>`
    ).join("<br>") + "<br>Done";
  }

  return `
    <input type="file" id="${type}_${d.Code}" multiple><br>
    <button onclick="uploadFiles('${d.Code}','${type}','${d["Stockist Name"]}')">Upload</button>
  `;
}

async function uploadFiles(code,type,name){

  const value=document.getElementById(`val_${code}`).value;
  const files=document.getElementById(`${type}_${code}`).files;

  if(!value) return alert("Value required");
  if(files.length===0) return alert("Select files");

  const form=new FormData();
  form.append("code",code);
  form.append("stockistName",name);
  form.append("value",value);
  form.append("type",type);

  for(let f of files){
    form.append("files",f);
  }

  const res = await fetch('/uploadFile',{
    method:'POST',
    body:form,
    credentials:'include'
  });

  const result = await res.json();

  if(result.status==="success"){
    alert("Uploaded");
    load();
  } else {
    alert(result.msg);
  }
}

function downloadReport(){
  window.open('/downloadReport','_blank');
}

function downloadZip(){
  window.open('/downloadZip','_blank');
}

function logout(){
  window.location='/login.html';
}

load();

</script>

</body>
</html>
