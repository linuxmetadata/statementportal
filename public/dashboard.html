<!DOCTYPE html>
<html>
<head>
  <title>Statement Portal</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }
    h2 { text-align:center; }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th, td {
      padding:8px;
      border:1px solid #ccc;
      text-align:center;
    }

    th {
      background:#007bff;
      color:white;
    }

    input[type="text"] {
      width:90px;
      padding:5px;
    }

    .btn {
      padding:5px 10px;
      margin:2px;
      border:none;
      cursor:pointer;
      color:white;
      background:#007bff;
    }

    .delete { background:red; }

  </style>
</head>

<body>

<h2>Statement Portal</h2>

<div style="margin-bottom:10px;">
  <button onclick="downloadReport()">Download Report</button>
  <button onclick="downloadPending()">Download Pending</button>
  <button onclick="downloadFiles()">Download Files</button>
  <button onclick="refresh()">Refresh</button>
</div>

<table>
<thead>
<tr>
  <th>State</th>
  <th>BM HQ</th>
  <th>Code</th>
  <th>Stockist Name</th>
  <th>Value</th>
  <th>SSS</th>
  <th>AWS</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

let role = "";

// ================= LOAD =================
async function load() {

  const res = await fetch('/getData');
  const data = await res.json();

  role = data.role;

  const body = document.getElementById("body");
  body.innerHTML = "";

  if (!data.data || data.data.length === 0) {
    body.innerHTML = "<tr><td colspan='7'>No Data</td></tr>";
    return;
  }

  data.data.forEach(r => {

    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.STATE}</td>
      <td>${r.BM_HQ}</td>
      <td>${r.Code}</td>
      <td>${r.Name}</td>

      <td>
        <input type="text" value="${r.Value || ''}" 
        onchange="save('${r.Code}', this.value)">
      </td>

      <td>${fileCell(r,'SSS')}</td>
      <td>${fileCell(r,'AWS')}</td>
    `;

    body.appendChild(tr);
  });
}

// ================= SAVE VALUE =================
function save(code, value) {

  fetch('/saveValue', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({code, value})
  });
}

// ================= FILE CELL =================
function fileCell(row, type) {

  const inputId = `${type}_${row.Code}`;
  const btnId = `btn_${inputId}`;

  // 🔹 NO FILE
  if (!row[`${type}_File`]) {

    return `
      <input type="file" id="${inputId}" onchange="showUpload('${row.Code}','${type}')">
      <div id="${btnId}"></div>
    `;
  }

  // 🔹 FILE EXISTS
  let viewBtn = `<button class="btn" onclick="view('${row.Code}','${type}')">View</button>`;

  let deleteBtn = "";

  if (role === "admin") {
    deleteBtn = `<button class="btn delete" onclick="del('${row.Code}','${type}')">Delete</button>`;
  }

  return viewBtn + deleteBtn;
}

// ================= SHOW UPLOAD =================
function showUpload(code, type) {

  const input = document.getElementById(`${type}_${code}`);

  if (input.files.length > 0) {

    document.getElementById(`btn_${type}_${code}`).innerHTML = `
      <button class="btn" onclick="upload('${code}','${type}')">Upload</button>
    `;
  }
}

async function upload(code, type) {

  const input = document.getElementById(`${type}_${code}`);
  const file = input.files[0];

  if (!file) {
    return alert("Please choose file");
  }

  const form = new FormData();
  form.append("file", file);
  form.append("code", code);
  form.append("type", type);

  try {

    const res = await fetch('/uploadFile', {
      method: 'POST',
      body: form
    });

    const result = await res.json();

    console.log("UPLOAD RESPONSE:", result); // 👈 IMPORTANT

    if (result.status === "success") {
      alert("✅ File Uploaded Successfully");
    } else {
      alert("❌ " + (result.msg || "Upload failed"));
    }

  } catch (err) {
    console.error("UPLOAD ERROR:", err);
    alert("❌ Network / Server error");
  }

  load();
}

// ================= VIEW =================
function view(code, type) {
  window.open(`/viewFile?code=${code}&type=${type}`);
}

// ================= DELETE =================
async function del(code, type) {

  if (!confirm("Delete this file?")) return;

  await fetch('/deleteFile', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({code, type})
  });

  load();
}

// ================= DOWNLOAD =================
function downloadReport() {
  window.open('/downloadReport');
}

function downloadPending() {
  window.open('/downloadPending');
}

function downloadFiles() {
  window.open('/downloadAllFiles');
}

// ================= REFRESH =================
async function refresh() {
  await fetch('/refreshData');
  load();
}

// ================= INIT =================
load();

</script>

</body>
</html>
