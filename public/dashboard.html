<!DOCTYPE html>
<html>
<head>
  <title>Statement Portal</title>

  <style>
    body { font-family: Arial; background:#f2f2f2; }
    h2 { text-align:center; }

    .top { margin:20px; }

    .cards {
      display:flex;
      gap:20px;
      margin:20px;
    }

    .card {
      flex:1;
      background:white;
      padding:15px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 0 5px #ccc;
    }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th {
      background:#007bff;
      color:white;
      padding:10px;
    }

    td {
      padding:8px;
      border:1px solid #ddd;
      text-align:center;
    }

    input {
      padding:5px;
    }

    button {
      padding:5px 10px;
      margin:2px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>Statement Portal</h2>

<div class="top">

  <div id="adminSection" style="display:none;">
    <input type="file" id="excelFile">
    <button onclick="uploadExcel()">Upload Excel</button>

    <button onclick="downloadReport()">Download Report</button>
    <button onclick="downloadFiles()">Download Files</button>
  </div>

  <button onclick="downloadPending()">Download Pending</button>

</div>

<!-- CARDS -->
<div class="cards">
  <div class="card">Total<br><b id="total">0</b></div>
  <div class="card">SSS Received<br><b id="sssR">0</b><br><span id="sssRp"></span></div>
  <div class="card">SSS Pending<br><b id="sssP">0</b><br><span id="sssPp"></span></div>
  <div class="card">AWS Received<br><b id="awsR">0</b><br><span id="awsRp"></span></div>
  <div class="card">AWS Pending<br><b id="awsP">0</b><br><span id="awsPp"></span></div>
</div>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>State</th>
      <th>BM HQ</th>
      <th>Code</th>
      <th>Stockist Name</th>
      <th>Value</th>
      <th>SSS</th>
      <th>AWS</th>
    </tr>
    <tr>
      <th><input id="fState" onkeyup="filterData()"></th>
      <th><input id="fBM" onkeyup="filterData()"></th>
      <th><input id="fCode" onkeyup="filterData()"></th>
      <th><input id="fName" onkeyup="filterData()"></th>
      <th></th>
      <th></th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>

let DATA = [];
let role = "";

async function loadData(){

  const res = await fetch('/getData',{ credentials:'include' });
  const json = await res.json();

  DATA = json.data;
  role = json.role;

  if(role === "admin"){
    document.getElementById("adminSection").style.display = "block";
  }

  renderTable(DATA);
  updateCards(DATA);
}

// ================= RENDER TABLE =================
function renderTable(data){

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  if(data.length === 0){
    tbody.innerHTML = "<tr><td colspan='7'>No Data Available</td></tr>";
    return;
  }

  data.forEach(r=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.STATE}</td>
      <td>${r.BM_HQ}</td>
      <td>${r.Code}</td>
      <td>${r.Name}</td>

      <td>
        <input value="${r.Value}" onchange="saveValue('${r.Code}', this.value)">
      </td>

      <td>
        ${r.SSS ? "✅" : `
          <input type="file" onchange="uploadFile(event,'${r.Code}','SSS')">
        `}
        ${r.SSS_File ? `<button onclick="viewFile('${r.Code}','SSS')">View</button>` : ""}
      </td>

      <td>
        ${r.AWS ? "✅" : `
          <input type="file" onchange="uploadFile(event,'${r.Code}','AWS')">
        `}
        ${r.AWS_File ? `<button onclick="viewFile('${r.Code}','AWS')">View</button>` : ""}
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// ================= SAVE VALUE =================
async function saveValue(code,value){
  await fetch('/saveValue',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({code,value}),
    credentials:'include'
  });
}

// ================= UPLOAD FILE =================
async function uploadFile(e,code,type){

  const file = e.target.files[0];

  const formData = new FormData();
  formData.append("file",file);
  formData.append("code",code);
  formData.append("type",type);

  const res = await fetch('/uploadFile',{
    method:'POST',
    body: formData,
    credentials:'include'
  });

  const text = await res.text();
  alert(text);

  loadData();
}

// ================= VIEW =================
function viewFile(code,type){
  window.open(`/viewFile?code=${code}&type=${type}`);
}

// ================= UPLOAD EXCEL =================
async function uploadExcel(){

  const file = document.getElementById("excelFile").files[0];

  const formData = new FormData();
  formData.append("file",file);

  const res = await fetch('/uploadExcel',{
    method:'POST',
    body: formData,
    credentials:'include'
  });

  alert(await res.text());
  loadData();
}

// ================= DOWNLOAD =================
function downloadReport(){
  window.location = '/downloadReport';
}

function downloadFiles(){
  window.location = '/downloadAllFiles';
}

function downloadPending(){
  window.location = '/downloadPending';
}

// ================= FILTER =================
function filterData(){

  const s = document.getElementById("fState").value.toLowerCase();
  const b = document.getElementById("fBM").value.toLowerCase();
  const c = document.getElementById("fCode").value.toLowerCase();
  const n = document.getElementById("fName").value.toLowerCase();

  const filtered = DATA.filter(r =>
    r.STATE.toLowerCase().includes(s) &&
    r.BM_HQ.toLowerCase().includes(b) &&
    r.Code.toLowerCase().includes(c) &&
    r.Name.toLowerCase().includes(n)
  );

  renderTable(filtered);
  updateCards(filtered);
}

// ================= CARDS =================
function updateCards(data){

  const total = data.length;
  const sssR = data.filter(d=>d.SSS).length;
  const awsR = data.filter(d=>d.AWS).length;

  const sssP = total - sssR;
  const awsP = total - awsR;

  document.getElementById("total").innerText = total;

  document.getElementById("sssR").innerText = sssR;
  document.getElementById("sssRp").innerText = total?((sssR/total*100).toFixed(1)+"%"):"0%";

  document.getElementById("sssP").innerText = sssP;
  document.getElementById("sssPp").innerText = total?((sssP/total*100).toFixed(1)+"%"):"0%";

  document.getElementById("awsR").innerText = awsR;
  document.getElementById("awsRp").innerText = total?((awsR/total*100).toFixed(1)+"%"):"0%";

  document.getElementById("awsP").innerText = awsP;
  document.getElementById("awsPp").innerText = total?((awsP/total*100).toFixed(1)+"%"):"0%";
}

// ================= INIT =================
loadData();

</script>

</body>
</html>
