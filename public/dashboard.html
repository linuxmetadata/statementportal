<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body { font-family: Arial; }
.card { display:inline-block; margin:5px; padding:10px; background:#1f6fb2; color:#fff }
table { border-collapse: collapse; width:100%; }
td, th { padding:8px; border:1px solid #ccc; }
button { padding:5px; }
</style>

</head>

<body>

<h2>Dashboard</h2>

<button onclick="logout()">Logout</button>
<br><br>

<div>
<span class="card">Total: <span id="t"></span></span>
<span class="card">SSS Done: <span id="sd"></span></span>
<span class="card">SSS Pending: <span id="sp"></span></span>
<span class="card">AWS Done: <span id="ad"></span></span>
<span class="card">AWS Pending: <span id="ap"></span></span>
</div>

<br>

<input id="search" placeholder="Search..." onkeyup="filterData()">

<br><br>

<table>
<thead>
<tr>
<th>State</th>
<th>BM HQ</th>
<th>Code</th>
<th>Name</th>
<th>Value</th>
<th>SSS</th>
<th>AWS</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

let all = [];
let uploads = {};

async function load() {

    const res = await fetch("/getData");

    // if session expired → redirect
    if (res.status === 302 || res.redirected) {
        window.location.href = "/";
        return;
    }

    const data = await res.json();

    all = data.rows;
    uploads = data.uploads || {};

    render(all);
    cards();
}

// ================= RENDER =================
function render(data) {

    let html = "";

    data.forEach(r => {

        const sssKey = r.Code + "_SSS";
        const awsKey = r.Code + "_AWS";

        html += `
        <tr>
            <td>${r.STATE}</td>
            <td>${r.BM_HQ}</td>
            <td>${r.Code}</td>
            <td>${r["Stockist Name"]}</td>

            <td>
                <input id="v_${r.Code}" placeholder="Value">
            </td>

            <td>${cell(r, sssKey, 'SSS')}</td>
            <td>${cell(r, awsKey, 'AWS')}</td>
        </tr>`;
    });

    document.getElementById("body").innerHTML = html;
}

// ================= CELL =================
function cell(r, key, type) {

    const role = localStorage.getItem("role");

    if (uploads[key]) {
        return `
        <a href="${uploads[key].links[0]}" target="_blank">View</a>
        ${role === 'admin' ? `<button onclick="del('${key}')">Delete</button>` : ''}
        `;
    }

    if (role !== 'admin') return "-";

    return `
    <input type="file" multiple id="f_${key}">
    <button onclick="upload('${r.Code}','${r.STATE}','${r["Stockist Name"]}','${type}','${key}')">Upload</button>
    `;
}

// ================= UPLOAD =================
async function upload(code, state, name, type, key) {

    const files = document.getElementById("f_" + key).files;
    const value = document.getElementById("v_" + code).value;

    if (!value) {
        alert("Value mandatory ❗");
        return;
    }

    if (files.length === 0) {
        alert("Select file ❗");
        return;
    }

    const fd = new FormData();

    for (let f of files) fd.append("files", f);

    fd.append("code", code);
    fd.append("state", state);
    fd.append("name", name);
    fd.append("type", type);
    fd.append("value", value);

    const res = await fetch("/upload", {
        method: "POST",
        body: fd
    });

    const data = await res.json();

    alert(data.message);
    load();
}

// ================= DELETE =================
async function del(key) {

    await fetch("/delete", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ key })
    });

    load();
}

// ================= FILTER =================
function filterData() {

    const val = document.getElementById("search").value.toLowerCase();

    const filtered = all.filter(r =>
        (r.STATE || "").toLowerCase().includes(val) ||
        (r.Code || "").toLowerCase().includes(val) ||
        (r["Stockist Name"] || "").toLowerCase().includes(val)
    );

    render(filtered);
}

// ================= CARDS =================
function cards() {

    let total = all.length;
    let sDone = 0;
    let aDone = 0;

    Object.keys(uploads).forEach(k => {
        if (k.includes("SSS")) sDone++;
        else aDone++;
    });

    document.getElementById("t").innerText = total;
    document.getElementById("sd").innerText = sDone;
    document.getElementById("sp").innerText = total - sDone;
    document.getElementById("ad").innerText = aDone;
    document.getElementById("ap").innerText = total - aDone;
}

// ================= LOGOUT =================
function logout() {
    localStorage.clear();
    window.location.href = "/logout";
}

// ================= INIT =================
load();

</script>

</body>
</html>
