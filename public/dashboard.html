<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body { font-family: Arial; padding:20px; }

        .top { display:flex; justify-content:space-between; }

        .cards { display:flex; gap:10px; margin:10px 0; flex-wrap:wrap; }

        .card {
            padding:10px;
            background:#1f6fb2;
            color:white;
            cursor:pointer;
            border-radius:5px;
        }

        table {
            width:100%;
            border-collapse: collapse;
        }

        th, td {
            border:1px solid #ccc;
            padding:8px;
        }

        th {
            background:#1f6fb2;
            color:white;
        }

        input { width:90%; padding:5px; }

        .search input {
            width:95%;
        }
    </style>
</head>

<body>

<div class="top">
    <h2>Dashboard</h2>
    <button onclick="logout()">Logout</button>
</div>

<div id="loading">Loading data...</div>

<!-- 🔍 SEARCH -->
<table>
<tr class="search">
    <td><input id="s1" placeholder="State"></td>
    <td><input id="s2" placeholder="BM HQ"></td>
    <td><input id="s3" placeholder="Code"></td>
    <td><input id="s4" placeholder="Name"></td>
    <td colspan="3"></td>
</tr>
</table>

<!-- 📊 CARDS -->
<div class="cards">
    <div class="card" onclick="filterData('all')">Total <span id="total"></span></div>
    <div class="card" onclick="filterData('sss_done')">SSS Done <span id="sss_done"></span></div>
    <div class="card" onclick="filterData('sss_pending')">SSS Pending <span id="sss_pending"></span></div>
    <div class="card" onclick="filterData('aws_done')">AWS Done <span id="aws_done"></span></div>
    <div class="card" onclick="filterData('aws_pending')">AWS Pending <span id="aws_pending"></span></div>
</div>

<table>
<thead>
<tr>
    <th>State</th>
    <th>BM HQ</th>
    <th>Code</th>
    <th>Name</th>
    <th>Value</th>
    <th>SSS</th>
    <th>AWS</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

const role = localStorage.getItem("role");
if (!role) window.location.href = "/";

let originalData = [];
let filteredData = [];
let uploadedData = {};
let values = {};

function logout(){
    localStorage.clear();
    window.location.href = "/";
}

// 🚀 LOAD DATA
async function loadData(){
    document.getElementById("loading").style.display = "block";

    const res = await fetch('/getData');
    const data = await res.json();

    originalData = data.rows || [];
    filteredData = [...originalData];

    document.getElementById("loading").style.display = "none";

    updateCards();
    renderTable();
}

// 📊 CARDS
function updateCards(){
    let total = originalData.length;
    let sssDone = Object.keys(uploadedData).filter(k=>k.includes('SSS')).length;
    let awsDone = Object.keys(uploadedData).filter(k=>k.includes('AWS')).length;

    document.getElementById("total").innerText = total;
    document.getElementById("sss_done").innerText = sssDone;
    document.getElementById("sss_pending").innerText = total - sssDone;
    document.getElementById("aws_done").innerText = awsDone;
    document.getElementById("aws_pending").innerText = total - awsDone;
}

// 🎯 FILTER
function filterData(type){
    if(type==='all') filteredData = [...originalData];

    if(type==='sss_done')
        filteredData = originalData.filter(r=>uploadedData[r.Code+"_SSS"]);

    if(type==='sss_pending')
        filteredData = originalData.filter(r=>!uploadedData[r.Code+"_SSS"]);

    if(type==='aws_done')
        filteredData = originalData.filter(r=>uploadedData[r.Code+"_AWS"]);

    if(type==='aws_pending')
        filteredData = originalData.filter(r=>!uploadedData[r.Code+"_AWS"]);

    renderTable();
}

// 🔍 SEARCH
document.querySelectorAll('.search input').forEach(i=>{
    i.addEventListener('input', applySearch);
});

function applySearch(){
    const s1 = document.getElementById('s1').value.toLowerCase();
    const s2 = document.getElementById('s2').value.toLowerCase();
    const s3 = document.getElementById('s3').value.toLowerCase();
    const s4 = document.getElementById('s4').value.toLowerCase();

    filteredData = originalData.filter(r =>
        (r.STATE||'').toLowerCase().includes(s1) &&
        (r.BM_HQ||'').toLowerCase().includes(s2) &&
        (r.Code||'').toLowerCase().includes(s3) &&
        (r["Stockist Name"]||'').toLowerCase().includes(s4)
    );

    renderTable();
}

// 🧾 TABLE
function renderTable(){
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    filteredData.forEach(row=>{

        const code = row.Code;
        const keySSS = code+"_SSS";
        const keyAWS = code+"_AWS";

        table.innerHTML += `
        <tr>
            <td>${row.STATE}</td>
            <td>${row.BM_HQ}</td>
            <td>${code}</td>
            <td>${row["Stockist Name"]}</td>

            <td>
                <input value="${values[code]||''}" 
                    onchange="values['${code}']=this.value">
            </td>

            <td>${renderCell(code,'SSS')}</td>
            <td>${renderCell(code,'AWS')}</td>
        </tr>
        `;
    });
}

// 📦 CELL
function renderCell(code,type){

    const key = code+"_"+type;

    if(uploadedData[key]){
        return `
            <button onclick="viewFile()">View</button>
            ${role==='admin'?`<button onclick="deleteFile('${key}')">Delete</button>`:''}
        `;
    }

    if(role!=='admin') return '-';

    return `
        <input type="file" multiple onchange="selectFiles(event,'${code}','${type}')">
        <div id="btn_${key}"></div>
    `;
}

// 📂 SELECT
function selectFiles(e,code,type){
    const files = e.target.files;
    const key = code+"_"+type;

    document.getElementById("btn_"+key).innerHTML =
        `<button onclick="uploadFile('${code}','${type}')">Upload</button>`;

    uploadedData[key]={files};
}

// 🚀 UPLOAD
async function uploadFile(code,type){

    if(!values[code]){
        alert("Value is mandatory ❗");
        return;
    }

    const key = code+"_"+type;
    const data = uploadedData[key];

    const formData = new FormData();
    formData.append('code', code);
    formData.append('type', type);

    for(let f of data.files){
        formData.append('files', f);
    }

    const res = await fetch('/upload',{method:'POST',body:formData});
    const result = await res.json();

    alert(result.message);

    uploadedData[key]={done:true};

    updateCards();
    renderTable();
}

// 👁 VIEW
function viewFile(){
    alert("File link integration next step");
}

// ❌ DELETE
function deleteFile(key){
    delete uploadedData[key];
    updateCards();
    renderTable();
}

// INIT
loadData();

</script>

</body>
</html>
