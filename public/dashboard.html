<!DOCTYPE html>
<html>
<head>
  <title>Statement Portal</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }
    table { width:100%; border-collapse:collapse; background:#fff; }
    th, td { border:1px solid #ccc; padding:8px; text-align:center; }
    th { background:#1976d2; color:#fff; }
    input { padding:5px; width:90%; }
    .card { background:#fff; padding:15px; border-radius:10px; width:18%; display:inline-block; margin:5px; text-align:center; }
  </style>
</head>

<body>

<h2 style="text-align:center;">Statement Portal</h2>

<!-- SUMMARY -->
<div id="summary">
  <div class="card">Total<br><b id="total">0</b></div>
  <div class="card">SSS Received<br><b id="sssR">0</b></div>
  <div class="card">SSS Pending<br><b id="sssP">0</b></div>
  <div class="card">AWS Received<br><b id="awsR">0</b></div>
  <div class="card">AWS Pending<br><b id="awsP">0</b></div>
</div>

<br>

<!-- FILTER -->
<tr>
  <td><input id="f_state" placeholder="State"></td>
  <td><input id="f_bm" placeholder="BM HQ"></td>
  <td><input id="f_code" placeholder="Code"></td>
  <td><input id="f_name" placeholder="Stockist"></td>
</tr>

<br>

<table id="table">
  <thead>
    <tr>
      <th>State</th>
      <th>BM HQ</th>
      <th>Code</th>
      <th>Stockist Name</th>
      <th>SSS</th>
      <th>AWS</th>
    </tr>
  </thead>

  <tbody id="tbody">
  </tbody>
</table>

<script>

// 🔹 SAMPLE DATA (replace with Excel later)
const data = [
  {state:"ANDRA PRADESH", bm:"RAJAHMUNDRY", code:"AP183", name:"LAHARI MEDICAL AGENCIES"},
  {state:"ANDRA PRADESH", bm:"RAJAHMUNDRY", code:"AP243", name:"ROHINI MEDICAL AGENCIES"},
  {state:"ANDRA PRADESH", bm:"TIRUPATHI", code:"AP292", name:"HARIKA MEDICAL AGENCIES"}
];

let uploads = {};

// ================= LOAD =================
async function load() {

  const res = await fetch('/getData');
  const result = await res.json();
  uploads = result.uploads || {};

  renderTable();
  updateSummary();
}

// ================= TABLE =================
function renderTable() {

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const f_state = document.getElementById("f_state").value.toLowerCase();
  const f_bm = document.getElementById("f_bm").value.toLowerCase();
  const f_code = document.getElementById("f_code").value.toLowerCase();
  const f_name = document.getElementById("f_name").value.toLowerCase();

  data.forEach(d => {

    if (
      d.state.toLowerCase().includes(f_state) &&
      d.bm.toLowerCase().includes(f_bm) &&
      d.code.toLowerCase().includes(f_code) &&
      d.name.toLowerCase().includes(f_name)
    ) {

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${d.state}</td>
        <td>${d.bm}</td>
        <td>${d.code}</td>
        <td>${d.name}</td>
        <td>${renderCell(d, "SSS")}</td>
        <td>${renderCell(d, "AWS")}</td>
      `;

      tbody.appendChild(tr);
    }
  });
}

// ================= CELL =================
function renderCell(d, type) {

  const key = `${d.code}_${type}`;

  if (uploads[key]) {
    const f = uploads[key];

    return `
      <a href="/download/${f.fileId}" target="_blank">${f.fileName}</a><br>
      <small>${f.uploadedBy}</small><br>
      <small>${f.uploadedAt}</small>
    `;
  }

  return `
    <input type="file" id="${type}_${d.code}">
    <button onclick="upload('${d.code}','${type}','${d.name}')">Upload</button>
  `;
}

// ================= UPLOAD =================
async function upload(code, type, name) {

  const file = document.getElementById(`${type}_${code}`).files[0];

  if (!file) return alert("Choose file");

  const form = new FormData();
  form.append("file", file);
  form.append("code", code);
  form.append("type", type);
  form.append("stockistName", name);

  const res = await fetch('/uploadFile', { method:'POST', body:form });
  const result = await res.json();

  if (result.status === "success") {
    alert("Uploaded");
    load();
  } else {
    alert(result.msg);
  }
}

// ================= SUMMARY =================
function updateSummary() {

  let total = data.length;
  let sssR=0, sssP=0, awsR=0, awsP=0;

  data.forEach(d => {
    uploads[`${d.code}_SSS`] ? sssR++ : sssP++;
    uploads[`${d.code}_AWS`] ? awsR++ : awsP++;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("sssR").innerText = sssR;
  document.getElementById("sssP").innerText = sssP;
  document.getElementById("awsR").innerText = awsR;
  document.getElementById("awsP").innerText = awsP;
}

// ================= FILTER EVENTS =================
document.querySelectorAll("input").forEach(i => {
  i.addEventListener("input", renderTable);
});

// ================= INIT =================
load();

</script>

</body>
</html>
