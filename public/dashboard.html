<!DOCTYPE html>
<html>
<head>
  <title>Statement Portal</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; }
    h2 { text-align:center; }

    .btn {
      padding:6px 10px;
      margin:2px;
      cursor:pointer;
      border:none;
      color:white;
      background:#007bff;
    }

    .delete { background:red; }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th, td {
      padding:8px;
      border:1px solid #ccc;
      text-align:center;
    }

    th { background:#007bff; color:white; }

    input { width:100px; }
  </style>
</head>

<body>

<h2>Statement Portal</h2>

<button onclick="downloadReport()">Download Report</button>
<button onclick="downloadFiles()">Download Files</button>
<button onclick="downloadPending()">Download Pending</button>
<button onclick="refresh()">Refresh</button>

<br><br>

<table id="table">
<thead>
<tr>
  <th>State</th>
  <th>BM HQ</th>
  <th>Code</th>
  <th>Stockist Name</th>
  <th>Value</th>
  <th>SSS</th>
  <th>AWS</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let role = "";

// ================= LOAD DATA =================
async function loadData() {
  const res = await fetch('/getData');
  const data = await res.json();

  role = data.role;

  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  if (data.data.length === 0) {
    tbody.innerHTML = "<tr><td colspan='7'>No Data</td></tr>";
    return;
  }

  data.data.forEach(row => {

    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.STATE}</td>
      <td>${row.BM_HQ}</td>
      <td>${row.Code}</td>
      <td>${row.Name}</td>

      <td>
        <input value="${row.Value}" onchange="saveValue('${row.Code}', this.value)">
      </td>

      <td>${fileCell(row, 'SSS')}</td>
      <td>${fileCell(row, 'AWS')}</td>
    `;

    tbody.appendChild(tr);
  });
}

// ================= VALUE SAVE =================
function saveValue(code, value) {
  fetch('/saveValue', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({code, value})
  });
}

// ================= FILE CELL =================
function fileCell(row, type) {

  if (!row[`${type}_File`]) {

    return `
      <input type="file" id="${type}_${row.Code}">
      <button class="btn" onclick="upload('${row.Code}','${type}')">Upload</button>
    `;

  } else {

    let view = `<button class="btn" onclick="view('${row.Code}','${type}')">View</button>`;

    let del = "";

    if (role === "admin") {
      del = `<button class="btn delete" onclick="delFile('${row.Code}','${type}')">Delete</button>`;
    }

    return view + del;
  }
}

// ================= UPLOAD =================
async function upload(code, type) {

  let input = document.getElementById(`${type}_${code}`);
  let file = input.files[0];

  if (!file) return alert("Choose file");

  const form = new FormData();
  form.append("file", file);
  form.append("code", code);
  form.append("type", type);

  const res = await fetch('/uploadFile', {
    method:'POST',
    body: form
  });

  const msg = await res.text();
  alert(msg);

  loadData();
}

// ================= VIEW =================
function view(code, type) {
  window.open(`/viewFile?code=${code}&type=${type}`);
}

// ================= DELETE =================
async function delFile(code, type) {

  if (!confirm("Delete file?")) return;

  await fetch('/deleteFile', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({code, type})
  });

  loadData();
}

// ================= DOWNLOAD =================
function downloadReport() {
  window.open('/downloadReport');
}

function downloadFiles() {
  window.open('/downloadAllFiles');
}

function downloadPending() {
  window.open('/downloadPending');
}

// ================= REFRESH =================
async function refresh() {
  await fetch('/refreshData');
  loadData();
}

// ================= INIT =================
loadData();

</script>

</body>
</html>
