<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }

.top { display:flex; justify-content:space-between; }

.cards { display:flex; gap:10px; margin:15px 0; }

.card {
    background:#1f6fb2;
    color:white;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
}

.search { margin-bottom:10px; }
.search input { padding:6px; margin-right:5px; }

table {
    width:100%;
    border-collapse: collapse;
    background:white;
}

th {
    background:#1f6fb2;
    color:white;
    padding:8px;
}

td {
    padding:6px;
    border-bottom:1px solid #ddd;
}

button {
    padding:4px 6px;
    margin:2px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
    <h2>Dashboard</h2>
    <button onclick="logout()">Logout</button>
</div>

<!-- CARDS -->
<div class="cards">
    <div class="card" onclick="filterType('all')">Total: <span id="total"></span></div>
    <div class="card" onclick="filterType('sss_pending')">SSS Pending: <span id="sss_p"></span></div>
    <div class="card" onclick="filterType('aws_pending')">AWS Pending: <span id="aws_p"></span></div>
</div>

<!-- SEARCH -->
<div class="search">
    <input id="s1" placeholder="State">
    <input id="s2" placeholder="BM HQ">
    <input id="s3" placeholder="Code">
    <input id="s4" placeholder="Name">
</div>

<table>
<thead>
<tr>
    <th>State</th>
    <th>BM HQ</th>
    <th>Code</th>
    <th>Name</th>
    <th>Value</th>
    <th>SSS</th>
    <th>AWS</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

const role = localStorage.getItem("role");
if (!role) window.location.href = "/";

let allData = [];
let displayData = [];
let values = {};
let uploads = {};
let page = 0;
const PAGE_SIZE = 50;

// 🚀 LOAD DATA (FAST)
async function loadData(){
    const res = await fetch('/getData');
    const data = await res.json();

    allData = data.rows || [];
    displayData = [...allData];

    updateCards();
    renderPage();
}

// 📄 PAGINATION
function renderPage(){
    const table = document.getElementById("tableBody");

    const start = page * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const rows = displayData.slice(start, end);

    table.innerHTML = "";

    rows.forEach(r => {

        const code = r.Code;

        table.innerHTML += `
        <tr>
            <td>${r.STATE}</td>
            <td>${r.BM_HQ}</td>
            <td>${code}</td>
            <td>${r["Stockist Name"]}</td>

            <td>
                <input value="${values[code]||''}" 
                onchange="values['${code}']=this.value">
            </td>

            <td>${cell(code,'SSS')}</td>
            <td>${cell(code,'AWS')}</td>
        </tr>
        `;
    });
}

// 📦 CELL UI
function cell(code,type){
    const key = code+"_"+type;

    if(uploads[key]){
        return `
        <button onclick="view()">View</button>
        ${role==='admin'?`<button onclick="remove('${key}')">Delete</button>`:''}
        `;
    }

    if(role!=='admin') return '-';

    return `
    <input type="file" multiple onchange="selectFile(event,'${code}','${type}')">
    <button onclick="upload('${code}','${type}')">Upload</button>
    `;
}

// 📂 SELECT
function selectFile(e,code,type){
    uploads[code+"_"+type] = {files:e.target.files};
}

// 🚀 UPLOAD (FIXED)
async function upload(code,type){

    if(!values[code]){
        alert("Enter Value first ❗");
        return;
    }

    const key = code+"_"+type;
    const data = uploads[key];

    if(!data || !data.files){
        alert("Select file first ❗");
        return;
    }

    const form = new FormData();
    form.append('code', code);
    form.append('type', type);

    for(let f of data.files){
        form.append('files', f);
    }

    try{
        const res = await fetch('/upload',{method:'POST',body:form});
        const r = await res.json();

        alert(r.message);
        uploads[key] = {done:true};

        updateCards();
        renderPage();

    }catch(e){
        alert("Upload error ❌");
    }
}

// ❌ DELETE
function remove(key){
    delete uploads[key];
    updateCards();
    renderPage();
}

// 👁 VIEW
function view(){
    alert("View link next step");
}

// 📊 CARDS
function updateCards(){
    document.getElementById("total").innerText = allData.length;
    document.getElementById("sss_p").innerText =
        allData.length - Object.keys(uploads).filter(k=>k.includes('SSS')).length;

    document.getElementById("aws_p").innerText =
        allData.length - Object.keys(uploads).filter(k=>k.includes('AWS')).length;
}

// 🔍 SEARCH
document.querySelectorAll('.search input').forEach(i=>{
    i.addEventListener('input', ()=>{
        const s1 = document.getElementById('s1').value.toLowerCase();
        const s2 = document.getElementById('s2').value.toLowerCase();
        const s3 = document.getElementById('s3').value.toLowerCase();
        const s4 = document.getElementById('s4').value.toLowerCase();

        displayData = allData.filter(r =>
            (r.STATE||'').toLowerCase().includes(s1) &&
            (r.BM_HQ||'').toLowerCase().includes(s2) &&
            (r.Code||'').toLowerCase().includes(s3) &&
            (r["Stockist Name"]||'').toLowerCase().includes(s4)
        );

        page = 0;
        renderPage();
    });
});

// 🚪 LOGOUT
function logout(){
    localStorage.clear();
    window.location.href = "/";
}

// INIT
loadData();

</script>

</body>
</html>
